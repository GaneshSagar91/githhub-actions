name: Running jobs sequentially
on: push
jobs:
    first-job:
        runs-on: ubuntu-latest
        steps:
            - name: pwd
              run: pwd
    second-job:
        runs-on: ubuntu-latest
        needs: first-job
        steps:
            - name: whoami
              run: whoami
    third-job:
        runs-on: ubuntu-latest
        needs: second-job
        steps:
            - name: ls
              run: ls